target-version = "py312"
indent-width = 4
line-length = 120
exclude = [
  "__pycache__",
  ".mypy_cache",
  ".ruff_cache",
  ".venv",
  "*.egg-info",
  "build",
  "data",
  "dist",
  "out",
  "*log*",
]

[lint]
select = ["ALL"]
fixable = ["ALL"]
ignore = ["EM101", "TRY002", "TRY003"]

[extend-per-file-ignores]
"__init__.py" = ["D1", "F403"]
"__main__.py" = ["D1"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
